# TikTok Strategist — tuned for FYP monitoring and creator outreach.

model:
  default: "anthropic/claude-sonnet-4-5"
  provider: "anthropic"

memory:
  memory_enabled: true
  memory_char_limit: 5000

agent:
  reasoning_effort: "medium"
  disabled_toolsets:
    - tts
    - stt

web:
  backend: "exa"                    # better for TikTok / trend discovery

browser:
  inactivity_timeout: 600           # FYP / Creative Center browsing

approvals:
  mode: "smart"
